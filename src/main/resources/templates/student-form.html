<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1 class="mb-4">Add New Student</h1>
    <form th:action="@{/students}" th:object="${student}" method="post">
        <div class="mb-3">
            <input type="text" th:field="*{name}" class="form-control" placeholder="Name"/>
        </div>
        <div class="mb-3">
            <input type="text" th:field="*{surname}" class="form-control" placeholder="Surname"/>
        </div>
        <div class="mb-3">
            <input type="number" th:field="*{age}" class="form-control" placeholder="Age"/>
        </div>
        <div class="mb-3">
            <input type="text" th:field="*{university}" class="form-control" placeholder="University"/>
        </div>
        <button type="submit" class="btn btn-success">Save</button>
        <a href="/students" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
